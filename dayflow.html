function getFilteredTasks() {
  const today = new Date().toISOString().split('T')[0];
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
  return tasks.filter(t => {
    if (t.assignedTo && t.assignedTo !== 'me') return false; // only my tasks
    if (statsPeriod === 'today') return t.due === today || (!t.due && t.col !== 'done');
    if (statsPeriod === 'week')  return !t.due || t.due >= weekAgo;
    return true;
  });
}

function renderStats() {
  const ft = getFilteredTasks();
  const today = new Date().toISOString().split('T')[0];

  const todo   = ft.filter(t => t.col === 'todo').length;
  const doing  = ft.filter(t => t.col === 'doing').length;
  const done   = ft.filter(t => t.col === 'done').length;
  const total  = ft.length;
  const fromNet= ft.filter(t => t.assignedBy && t.assignedBy !== 'me').length;
  const overdue= ft.filter(t => t.due && t.due < today && t.col !== 'done').length;
  const pct    = total === 0 ? 0 : Math.round(done / total * 100);

  // KPI cards
  document.getElementById('statsKpiRow').innerHTML = [
    { cls:'total',    icon:'📋', val: total,   lbl:'Total Tasks',    sub: `${pct}% complete` },
    { cls:'todo',     icon:'📝', val: todo,    lbl:'To Do',          sub: 'Not started yet' },
    { cls:'doing',    icon:'⚡', val: doing,   lbl:'In Progress',    sub: 'Currently active' },
    { cls:'done',     icon:'✅', val: done,    lbl:'Completed',      sub: statsPeriod === 'today' ? 'Today' : statsPeriod === 'week' ? 'This week' : 'All time' },
    { cls:'network-c',icon:'🌐', val: fromNet, lbl:'From Network',   sub: 'Assigned by others' },
    { cls:'overdue-c',icon:'⚠️', val: overdue, lbl:'Overdue',        sub: overdue > 0 ? 'Need attention!' : 'All on track 🎉' },
  ].map(k => `
    <div class="kpi-card ${k.cls}">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-label">${k.lbl}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');

  // Category bar chart
  const cats = ['work','home','health','personal','errand'];
  const catColors = { work:'#3b82f6', home:'#f59e0b', health:'#22c55e', personal:'#ec4899', errand:'#8b5cf6' };
  const catCounts = {};
  cats.forEach(c => catCounts[c] = ft.filter(t => t.tag === c).length);
  const maxCat = Math.max(1, ...Object.values(catCounts));
  document.getElementById('statsCategoryChart').innerHTML = `<div class="bar-chart">` +
    cats.filter(c => catCounts[c] >= 0).map(c => `
      <div class="bar-row">
        <div class="bar-label">${c}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(catCounts[c]/maxCat*100)}%;background:${catColors[c]}"></div></div>
        <div class="bar-count">${catCounts[c]}</div>
      </div>`).join('') + `</div>`;

  // Priority donut
  const priData = [
    { key:'high', label:'High',   color:'#dc2626', count: ft.filter(t=>t.priority==='high').length },
    { key:'med',  label:'Medium', color:'#d4a017', count: ft.filter(t=>t.priority==='med').length },
    { key:'low',  label:'Low',    color:'#22c55e', count: ft.filter(t=>t.priority==='low').length },
  ];
  const priTotal = Math.max(1, priData.reduce((a,b)=>a+b.count,0));
  const r = 48, cx = 60, cy = 60, stroke = 18;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const arcs = priData.map(d => {
    const dash = (d.count / priTotal) * circ;
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-offset}" stroke-linecap="butt" />`;
    offset += dash;
    return arc;
  });
  document.getElementById('statsPriorityChart').innerHTML = `
    <div class="ring-stat">
      <div class="ring-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="${stroke}" />
          ${arcs.join('')}
        </svg>
        <div class="ring-center">
          <div class="ring-center-val">${priTotal}</div>
          <div class="ring-center-lbl">tasks</div>
        </div>
      </div>
      <div class="ring-legend">
        ${priData.map(d=>`<div class="ring-legend-item"><div class="ring-legend-dot" style="background:${d.color}"></div>${d.label}: ${d.count}</div>`).join('')}
      </div>
    </div>`;

  // Completion time: show done tasks with simulated days-to-complete
  const doneTasks = ft.filter(t => t.col === 'done');
  const completionEl = document.getElementById('statsCompletionChart');
  if (doneTasks.length === 0) {
    completionEl.innerHTML = `<div class="empty-state" style="padding:14px"><div class="empty-icon">⏱️</div>No completed tasks yet</div>`;
    document.getElementById('statsAvgDays').innerHTML = '';
  } else {
    // Simulate days-to-complete (in a real app this would be stored)
    const seeded = doneTasks.map((t,i) => {
      const seed = (t.id * 7 + 3) % 8 + 1;
      return { ...t, days: seed };
    });
    const avg = (seeded.reduce((a,b)=>a+b.days,0) / seeded.length).toFixed(1);
    const maxDays = Math.max(...seeded.map(t=>t.days));
    completionEl.innerHTML = `<div class="completion-bars">` +
      seeded.slice(0,6).map(t => {
        const cls = t.days <= 2 ? 'fast' : t.days <= 5 ? 'med' : 'slow';
        const label = t.days === 1 ? '1 day' : `${t.days} days`;
        return `<div class="completion-row">
          <div class="completion-task" title="${t.title}">${t.title}</div>
          <div class="bar-track" style="max-width:80px"><div class="bar-fill" style="width:${(t.days/maxDays*100)}%;background:${cls==='fast'?'var(--col-done)':cls==='med'?'var(--warn)':'#dc2626'}"></div></div>
          <div class="completion-days ${cls}">${label}</div>
        </div>`;
      }).join('') + `</div>`;
    document.getElementById('statsAvgDays').innerHTML =
      `<div class="avg-chip">⌀ Average: <strong>${avg} days</strong> to complete</div>`;
  }

  // Task log table
  const logTasks = [...ft].sort((a,b) => {
    const order = { doing:0, todo:1, done:2 };
    return (order[a.col]??3) - (order[b.col]??3);
  });
  const statusPill = s => ({
    todo:  `<span class="status-pill todo">📝 To Do</span>`,
    doing: `<span class="status-pill doing">⚡ In Progress</span>`,
    done:  `<span class="status-pill done">✅ Done</span>`,
  }[s] || s);
  const priLabel = { high:'🔴 High', med:'🟡 Med', low:'🟢 Low' };
  document.getElementById('statsTaskLog').innerHTML = logTasks.length === 0
    ? `<div class="empty-state"><div class="empty-icon">📋</div>No tasks in this period</div>`
    : `<table class="task-log-table">
        <thead><tr>
          <th>Task</th><th>Category</th><th>Priority</th><th>Due</th><th>Status</th><th>Source</th>
        </tr></thead>
        <tbody>` +
        logTasks.map(t => {
          const due = t.due ? new Date(t.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—';
          const dueStyle = t.due && t.due < today && t.col !== 'done' ? 'color:#dc2626;font-weight:700' : '';
          const src = t.assignedBy && t.assignedBy !== 'me' ? `<span style="color:var(--col-network);font-weight:600;font-size:11px">🌐 ${t.assignedBy}</span>` : '<span style="color:var(--ink-mute);font-size:11px">👤 Me</span>';
          return `<tr>
            <td style="font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</td>
            <td><span class="tag ${t.tag||'personal'}">${t.tag||'personal'}</span></td>
            <td style="font-size:12px;font-weight:600">${priLabel[t.priority]||t.priority}</td>
            <td style="font-size:12px;${dueStyle}">${due}</td>
            <td>${statusPill(t.col)}</td>
            <td>${src}</td>
          </tr>`;
        }).join('') +
      `</tbody></table>`;

  // Network activity
  const byMe = tasks.filter(t => t.assignedBy === 'me');
  const toMe = tasks.filter(t => t.assignedBy && t.assignedBy !== 'me' && t.assignedTo === 'me');
  const members = Object.keys(networkMembers);
  document.getElementById('statsNetworkActivity').innerHTML = members.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🌐</div>Add people to your network to see activity</div>`
    : `<div>` + members.map(k => {
        const m = networkMembers[k];
        const sent = byMe.filter(t => t.assignedTo === k).length;
        const recv = toMe.filter(t => t.assignedBy === k).length;
        return `<div class="net-activity-row">
          <div class="invite-avatar" style="width:36px;height:36px;font-size:13px;background:${m.color}">${m.initial}</div>
          <div class="net-activity-text">
            <strong>${m.fullName}</strong><br>
            <span style="font-size:11px;color:var(--ink-mute)">
              You assigned them <strong>${sent}</strong> task${sent!==1?'s':''} &nbsp;·&nbsp;
              They assigned you <strong>${recv}</strong> task${recv!==1?'s':''}
            </span>
          </div>
          <div style="display:flex;gap:14px">
            <div style="text-align:center">
              <div class="net-activity-count" style="color:var(--accent)">${sent}</div>
              <div style="font-size:10px;color:var(--ink-mute);font-weight:600">SENT</div>
            </div>
            <div style="text-align:center">
              <div class="net-activity-count" style="color:var(--col-network)">${recv}</div>
              <div style="font-size:10px;color:var(--ink-mute);font-weight:600">RECEIVED</div>
            </div>
          </div>
        </div>`;
      }).join('') + `</div>`;
}

// CLOSE DROPDOWNS ON OUTSIDE CLICK
document.addEventListener('click', e => {
  if (!e.target.closest('#notifBtn') && !e.target.closest('#notifPanel')) {
    document.getElementById('notifPanel').classList.remove('open');
  }
  if (!e.target.closest('#ctxMenu') && !e.target.closest('.card-menu-btn')) {
    document.getElementById('ctxMenu').classList.remove('open');
  }
});

// KEY: ESC closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeShareModal(); closeLightbox(); closeInviteModal(); } });

// INIT
(async () => {
  const authed = await initAuth();
  if (!authed) return; // redirecting to landing
  render();
  refreshHeaderAvatars();
  // Notifications
  showNotifPermissionBanner();
  if (Notification.permission === 'granted') {
    checkAndNotifyOverdue();
    scheduleDailySummary();
  }
})();

// ── REGISTER SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('DayFlow SW registered:', reg.scope);
        // Listen for messages from the service worker
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data.type === 'CHECK_OVERDUE') checkAndNotifyOverdue();
          if (event.data.type === 'DAILY_SUMMARY') sendDailySummaryNotification();
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// ── PUSH NOTIFICATIONS ────────────────────────────
const NOTIF_STORAGE_KEY = 'df_notif_permission';

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

async function showPushNotification(title, body, tag, url) {
  const granted = await requestNotificationPermission();
  if (!granted) return;

  // Use service worker notification if available (works when app is in background)
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification(title, {
      body,
      icon: './icon.svg',
      badge: './icon.svg',
      tag: tag || 'dayflow',
      data: { url: url || './dayflow.html' },
      vibrate: [100, 50, 100],
      actions: [
        { action: 'view',    title: '👁 View' },
        { action: 'dismiss', title: '✕ Dismiss' }
      ]
    });
  } else {
    // Fallback to basic notification
    new Notification(title, { body, icon: './icon.svg', tag });
  }
}

// 1. TASK ASSIGNED BY NETWORK MEMBER
function notifyTaskAssigned(taskTitle, assignedBy) {
  showPushNotification(
    '📋 New task from ' + assignedBy,
    '"' + taskTitle + '" has been assigned to you',
    'task-assigned',
    './dayflow.html'
  );
}

// 2. TASK COMPLETED BY NETWORK MEMBER
function notifyTaskCompleted(taskTitle, completedBy) {
  showPushNotification(
    '✅ Task completed by ' + completedBy,
    '"' + taskTitle + '" has been marked as done',
    'task-completed',
    './dayflow.html'
  );
}

// 3. NEW NETWORK INVITE
function notifyNetworkInvite(fromName) {
  showPushNotification(
    '🌐 Network invite from ' + fromName,
    fromName + ' wants to join your DayFlow network',
    'network-invite',
    './dayflow.html'
  );
}

// 4. OVERDUE TASKS CHECK — runs on load and every hour
function checkAndNotifyOverdue() {
  const today = new Date().toISOString().split('T')[0];
  const overdue = tasks.filter(t =>
    t.col !== 'done' &&
    t.assignedTo === 'me' &&
    t.due && t.due < today
  );
  if (overdue.length === 0) return;

  const lastNotif = localStorage.getItem('df_overdue_notif_date');
  const todayStr = new Date().toDateString();
  if (lastNotif === todayStr) return; // Only once per day

  localStorage.setItem('df_overdue_notif_date', todayStr);
  showPushNotification(
    '⚠️ You have ' + overdue.length + ' overdue task' + (overdue.length > 1 ? 's' : ''),
    overdue.length === 1
      ? '"' + overdue[0].title + '" is past its due date'
      : 'Including: "' + overdue[0].title + '" and ' + (overdue.length - 1) + ' more',
    'overdue-tasks',
    './dayflow.html'
  );
}

// 5. DAILY SUMMARY — shown each morning at 8am
function sendDailySummaryNotification() {
  const today = new Date().toISOString().split('T')[0];
  const todayTasks  = tasks.filter(t => t.due === today && t.assignedTo === 'me');
  const doneTasks   = todayTasks.filter(t => t.col === 'done').length;
  const totalTasks  = todayTasks.length;
  const pendingTasks = totalTasks - doneTasks;

  const lastSummary = localStorage.getItem('df_summary_notif_date');
  const todayStr = new Date().toDateString();
  if (lastSummary === todayStr) return;

  localStorage.setItem('df_summary_notif_date', todayStr);

  if (totalTasks === 0) {
    showPushNotification(
      '☀️ Good morning! DayFlow',
      'No tasks scheduled for today — enjoy your day or add some!',
      'daily-summary'
    );
  } else {
    showPushNotification(
      '☀️ Good morning! You have ' + pendingTasks + ' task' + (pendingTasks !== 1 ? 's' : '') + ' today',
      doneTasks > 0
        ? doneTasks + ' already done · ' + pendingTasks + ' remaining — keep it up!'
        : 'Let\'s get started — ' + totalTasks + ' task' + (totalTasks !== 1 ? 's' : '') + ' to tackle today',
      'daily-summary'
    );
  }
}

// Schedule daily summary at 8am
function scheduleDailySummary() {
  const now = new Date();
  const next8am = new Date(now);
  next8am.setHours(8, 0, 0, 0);
  if (now >= next8am) next8am.setDate(next8am.getDate() + 1);
  const msUntil8am = next8am - now;
  setTimeout(() => {
    sendDailySummaryNotification();
    setInterval(sendDailySummaryNotification, 24 * 60 * 60 * 1000);
  }, msUntil8am);
}

// Show a permission prompt banner after 10 seconds if not yet granted
function showNotifPermissionBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default') return;
  if (localStorage.getItem(NOTIF_STORAGE_KEY) === 'dismissed') return;

  setTimeout(() => {
    if (document.getElementById('notif-permission-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'notif-permission-banner';
    banner.style.cssText = `
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:var(--surface); border:1.5px solid var(--border);
      color:var(--ink); padding:14px 20px; border-radius:12px;
      font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif;
      box-shadow:0 8px 32px rgba(0,0,0,0.15);
      display:flex; align-items:center; gap:12px;
      z-index:9999; max-width:90vw;
      animation:slideIn .3s ease;
    `;
    banner.innerHTML = `
      <span style="font-size:20px">🔔</span>
      <div style="flex:1">
        <div style="font-weight:700;margin-bottom:2px">Enable notifications</div>
        <div style="font-size:11px;color:var(--ink-soft)">Get alerts for tasks, network activity & daily summaries</div>
      </div>
      <button onclick="enableNotifications()" style="background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;">Enable</button>
      <button onclick="dismissNotifBanner()" style="background:none;border:none;color:var(--ink-mute);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;">✕</button>
    `;
    document.body.appendChild(banner);
  }, 10000);
}

async function enableNotifications() {
  document.getElementById('notif-permission-banner')?.remove();
  const granted = await requestNotificationPermission();
  if (granted) {
    scheduleDailySummary();
    checkAndNotifyOverdue();
    showPushNotification(
      '✅ Notifications enabled!',
      'You\'ll now receive task alerts and daily summaries from DayFlow',
      'notif-enabled'
    );
  }
}

function dismissNotifBanner() {
  localStorage.setItem(NOTIF_STORAGE_KEY, 'dismissed');
  document.getElementById('notif-permission-banner')?.remove();
}

// ── PWA INSTALL PROMPT ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 30 seconds
  setTimeout(() => showInstallBanner(), 30000);
});

function showInstallBanner() {
  if (!deferredPrompt) return;
  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = `
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff;
    padding:12px 20px; border-radius:12px;
    font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    display:flex; align-items:center; gap:12px;
    z-index:9999; white-space:nowrap;
    animation:slideIn .3s ease;
  `;
  banner.innerHTML = `
    <span>📱 Install DayFlow on your device</span>
    <button onclick="installPWA()" style="background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">Install</button>
    <button onclick="document.getElementById('pwa-banner').remove()" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:18px;line-height:1;">✕</button>
  `;
  document.body.appendChild(banner);
}

async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-banner')?.remove();
}

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('pwa-banner')?.remove();
});
</script>
