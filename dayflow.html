<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayFlow — Your Daily Task Board</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8531a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DayFlow">
<link rel="apple-touch-icon" href="icon.svg">

<!-- SEO -->
<meta name="description" content="DayFlow — Organise your day with a personal Kanban board. Manage tasks, collaborate with your network, and track your progress.">
<meta name="author" content="Simba Chitauro">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #e2dbd0;
    --ink: #1a1614;
    --ink-soft: #6b6460;
    --ink-mute: #a8a09a;
    --accent: #e8531a;
    --accent-soft: #fde8df;
    --accent2: #2d6a4f;
    --accent2-soft: #d8ede3;
    --warn: #d4a017;
    --warn-soft: #fdf3d8;
    --col-todo: #3b82f6;
    --col-todo-soft: #dbeafe;
    --col-doing: #e8531a;
    --col-doing-soft: #fde8df;
    --col-done: #2d6a4f;
    --col-done-soft: #d8ede3;
    --col-network: #7c3aed;
    --col-network-soft: #ede9fe;
    --shadow: 0 2px 12px rgba(26,22,20,0.07);
    --shadow-lg: 0 8px 32px rgba(26,22,20,0.12);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 900;
    color: #fff;
    font-size: 18px;
    letter-spacing: -1px;
  }
  .logo-text {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex; align-items: center; gap: 14px;
  }
  .date-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .avatar-row { display: flex; align-items: center; gap: -4px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; cursor: pointer;
    position: relative;
    transition: transform .15s;
  }
  .avatar:hover { transform: scale(1.1); z-index: 2; }
  .avatar.me { background: var(--accent); color: #fff; }
  .avatar.net1 { background: #7c3aed; color: #fff; margin-left: -6px; }
  .avatar.net2 { background: #2d6a4f; color: #fff; margin-left: -6px; }
  .avatar.net3 { background: #d4a017; color: #fff; margin-left: -6px; }

  .notif-btn {
    position: relative;
    background: none; border: none; cursor: pointer;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    transition: background .15s;
    font-size: 18px;
  }
  .notif-btn:hover { background: var(--surface2); }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%;
    border: 2px solid var(--surface);
  }

  /* TABS */
  .tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 16px 28px 0;
  }
  .tab {
    padding: 8px 18px;
    border-radius: 8px 8px 0 0;
    border: 1.5px solid transparent;
    border-bottom: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    background: transparent;
    color: var(--ink-soft);
  }
  .tab.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--ink);
    font-weight: 600;
  }
  .tab:not(.active):hover { color: var(--ink); background: var(--surface2); }
  .tab-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--col-network); color: #fff;
    border-radius: 10px; padding: 0 6px; font-size: 10px;
    min-width: 18px; height: 16px;
    margin-left: 6px;
  }

  /* MAIN BOARD */
  .board-wrap {
    padding: 0 28px 32px;
    overflow-x: auto;
  }
  .board-header-bar {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .board-filters { display: flex; gap: 8px; align-items: center; }
  .filter-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all .15s;
  }
  .filter-pill.active, .filter-pill:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .add-task-btn {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent);
    color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-task-btn:hover { background: #c93e0e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,83,26,.3); }

  .board {
    display: flex;
    gap: 18px;
    min-width: 900px;
    align-items: flex-start;
  }

  /* COLUMNS */
  .col {
    flex: 1;
    min-width: 260px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .col-header.todo { background: var(--col-todo-soft); border-color: #bfdbfe; color: var(--col-todo); }
  .col-header.doing { background: var(--col-doing-soft); border-color: #fcd5c5; color: var(--col-doing); }
  .col-header.done { background: var(--col-done-soft); border-color: #b7e0cc; color: var(--col-done); }
  .col-header.network { background: var(--col-network-soft); border-color: #ddd6fe; color: var(--col-network); }

  .col-count {
    background: rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 12px;
  }

  .drop-zone {
    min-height: 80px;
    border-radius: var(--radius);
    border: 2px dashed transparent;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px 0;
  }
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-soft);
    padding: 8px;
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: grab;
    box-shadow: var(--shadow);
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .card:active { cursor: grabbing; }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--accent);
  }
  .card.dragging {
    opacity: 0.5;
    transform: rotate(2deg) scale(0.97);
  }
  .card.network-assigned::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--col-network);
    border-radius: 12px 0 0 12px;
  }
  .card.from-me::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 12px 0 0 12px;
  }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    color: var(--ink);
  }
  .card-menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--ink-mute); font-size: 16px;
    line-height: 1; padding: 0 2px; border-radius: 4px;
    transition: all .1s; flex-shrink: 0;
  }
  .card-menu-btn:hover { background: var(--surface2); color: var(--ink); }

  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .tag {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .tag.work { background: #dbeafe; color: #1e40af; }
  .tag.home { background: #fef9c3; color: #854d0e; }
  .tag.health { background: #dcfce7; color: #166534; }
  .tag.personal { background: #fce7f3; color: #9d174d; }
  .tag.urgent { background: #fee2e2; color: #991b1b; }
  .tag.errand { background: #e0e7ff; color: #3730a3; }

  .card-due {
    font-size: 11px; color: var(--ink-mute); font-weight: 500;
    display: flex; align-items: center; gap: 3px;
  }
  .card-due.overdue { color: #dc2626; }
  .card-due.today { color: var(--accent); font-weight: 700; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .assigned-by {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--ink-soft);
  }
  .mini-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .card-actions { display: flex; gap: 4px; }
  .card-action-btn {
    background: none; border: none; cursor: pointer;
    color: var(--ink-mute); font-size: 13px;
    padding: 3px 5px; border-radius: 4px;
    transition: all .1s;
  }
  .card-action-btn:hover { background: var(--surface2); color: var(--ink); }

  .card-note {
    font-size: 12px; color: var(--ink-soft); margin-top: 6px;
    line-height: 1.5;
  }
  .priority-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
  }
  .priority-dot.high { background: #dc2626; }
  .priority-dot.med { background: var(--warn); }
  .priority-dot.low { background: #22c55e; }

  /* NETWORK PANEL */
  .network-col {
    width: 280px; min-width: 280px; flex-shrink: 0;
  }
  .network-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .network-person {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .network-person:last-child { border-bottom: none; padding-bottom: 0; }
  .network-info { flex: 1; }
  .network-name { font-size: 13px; font-weight: 600; }
  .network-tasks { font-size: 11px; color: var(--ink-mute); }
  .assign-btn {
    background: var(--col-network-soft);
    border: 1.5px solid #ddd6fe;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--col-network);
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .assign-btn:hover { background: var(--col-network); color: #fff; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,22,20,0.5);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 480px; max-width: 95vw;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97);
    transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    margin-bottom: 20px; color: var(--ink);
  }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    transition: border-color .15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .tag-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag-opt {
    padding: 4px 12px; border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all .1s;
  }
  .tag-opt.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
  .assign-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .assignee-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all .1s; background: var(--surface2);
  }
  .assignee-chip.selected { border-color: var(--col-network); background: var(--col-network-soft); color: var(--col-network); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 9px 20px; border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent; font-size: 14px; font-weight: 600;
    cursor: pointer; color: var(--ink-soft);
    font-family: 'DM Sans', sans-serif;
    transition: all .1s;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 9px 22px; border-radius: 8px;
    background: var(--accent); color: #fff;
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .btn-save:hover { background: #c93e0e; }

  /* NOTIFICATION PANEL */
  .notif-panel {
    position: absolute; top: 64px; right: 28px;
    width: 320px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    z-index: 150;
    display: none;
    overflow: hidden;
  }
  .notif-panel.open { display: block; }
  .notif-panel-header {
    padding: 14px 16px;
    border-bottom: 1.5px solid var(--border);
    font-size: 13px; font-weight: 700; color: var(--ink);
    display: flex; justify-content: space-between;
  }
  .notif-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-start;
    transition: background .1s; cursor: pointer;
  }
  .notif-item:hover { background: var(--surface2); }
  .notif-item.unread { background: var(--accent-soft); }
  .notif-text { font-size: 12px; color: var(--ink); line-height: 1.5; }
  .notif-text strong { font-weight: 600; }
  .notif-time { font-size: 10px; color: var(--ink-mute); margin-top: 2px; }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 28px;
    margin-bottom: 20px;
  }
  .progress-bar-bg {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
  }
  .progress-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
  .progress-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #f97316); border-radius: 10px; transition: width .5s ease; }
  .progress-pct { font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .progress-stats { display: flex; gap: 14px; }
  .stat { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .stat span { font-weight: 700; color: var(--ink); }

  /* EMPTY STATE */
  .empty-state {
    padding: 24px 16px; text-align: center;
    color: var(--ink-mute); font-size: 13px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  .empty-icon { font-size: 24px; margin-bottom: 6px; }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 300;
    overflow: hidden;
    min-width: 160px;
    display: none;
  }
  .ctx-menu.open { display: block; }
  .ctx-item {
    padding: 9px 14px;
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .1s;
    color: var(--ink);
  }
  .ctx-item:hover { background: var(--surface2); }
  .ctx-item.danger { color: #dc2626; }
  .ctx-item.danger:hover { background: #fee2e2; }
  .ctx-divider { height: 1px; background: var(--border); }

  /* SHARE MODAL */
  .share-modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 400px; max-width: 95vw;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97);
    transition: transform .2s;
  }
  .modal-overlay.open .share-modal { transform: translateY(0) scale(1); }
  .share-task-preview {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .share-task-preview .stitle { font-weight: 700; font-size: 15px; margin-bottom: 4px; color: var(--ink); }
  .share-task-preview .smeta { color: var(--ink-soft); font-size: 12px; }
  .share-buttons { display: flex; flex-direction: column; gap: 10px; }
  .share-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
    text-decoration: none;
    color: var(--ink);
    background: var(--surface);
  }
  .share-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .share-btn.whatsapp { border-color: #25d366; color: #128c4a; }
  .share-btn.whatsapp:hover { background: #f0fdf4; }
  .share-btn.email { border-color: #3b82f6; color: #1d4ed8; }
  .share-btn.email:hover { background: #eff6ff; }
  .share-btn.copy { border-color: var(--border); color: var(--ink-soft); }
  .share-btn.copy:hover { background: var(--surface2); }
  .share-btn-icon { font-size: 22px; }
  .share-btn-text { display: flex; flex-direction: column; }
  .share-btn-label { font-size: 14px; font-weight: 600; }
  .share-btn-sub { font-size: 11px; font-weight: 400; opacity: 0.7; }
  .copy-confirm {
    display: none;
    text-align: center;
    font-size: 12px;
    color: var(--accent2);
    font-weight: 600;
    padding: 6px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ATTACHMENTS */
  .attach-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--bg);
    position: relative;
  }
  .attach-zone:hover, .attach-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .attach-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .attach-zone-label {
    font-size: 13px; color: var(--ink-soft); font-weight: 500;
    pointer-events: none;
  }
  .attach-zone-label span { color: var(--accent); font-weight: 700; }
  .attach-zone-sub { font-size: 11px; color: var(--ink-mute); margin-top: 3px; pointer-events: none; }

  .attach-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .attach-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    animation: slideIn .15s ease;
  }
  .attach-thumb {
    width: 36px; height: 36px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .attach-icon {
    width: 36px; height: 36px; border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .attach-info { flex: 1; min-width: 0; }
  .attach-name { font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .attach-size { color: var(--ink-mute); font-size: 10px; }
  .attach-remove {
    background: none; border: none; cursor: pointer;
    color: var(--ink-mute); font-size: 14px; padding: 2px 4px;
    border-radius: 4px; transition: all .1s; flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .attach-remove:hover { background: #fee2e2; color: #dc2626; }

  /* CARD ATTACHMENTS */
  .card-attachments {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 8px;
  }
  .card-attach-thumb {
    width: 48px; height: 48px; border-radius: 6px;
    object-fit: cover;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform .15s;
  }
  .card-attach-thumb:hover { transform: scale(1.05); }
  .card-attach-file {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 6px; padding: 4px 8px;
    font-size: 10px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s; max-width: 110px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-attach-file:hover { border-color: var(--accent); color: var(--accent); }
  .card-attach-count {
    width: 48px; height: 48px; border-radius: 6px;
    background: var(--surface2); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--ink-soft);
    cursor: pointer;
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 85vh;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px;
    background: rgba(255,255,255,0.15); border: none;
    color: #fff; font-size: 24px; cursor: pointer;
    border-radius: 50%; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.3); }
  .lightbox-name {
    position: absolute; bottom: 20px;
    background: rgba(0,0,0,0.5); color: #fff;
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
  }

  /* INVITE SYSTEM */
  .invite-hero {
    background: linear-gradient(135deg, var(--col-network-soft) 0%, var(--accent-soft) 100%);
    border: 1.5px solid #ddd6fe;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .invite-hero-icon { font-size: 36px; flex-shrink: 0; }
  .invite-hero-text h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .invite-hero-text p { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
  .invite-now-btn {
    margin-left: auto; flex-shrink: 0;
    background: var(--col-network); color: #fff;
    border: none; border-radius: 8px; padding: 10px 18px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s; white-space: nowrap;
  }
  .invite-now-btn:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,.3); }

  .pending-section { margin-top: 20px; }
  .pending-header {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--ink-soft);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .pending-badge {
    background: var(--warn); color: #fff;
    border-radius: 10px; padding: 1px 7px;
    font-size: 10px; font-weight: 700;
  }

  .invite-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    transition: all .15s;
  }
  .invite-card:hover { border-color: var(--col-network); }
  .invite-card.incoming { border-left: 3px solid var(--col-network); }
  .invite-card.outgoing { border-left: 3px solid var(--warn); }
  .invite-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .invite-info { flex: 1; min-width: 0; }
  .invite-name { font-size: 14px; font-weight: 700; color: var(--ink); }
  .invite-email { font-size: 11px; color: var(--ink-mute); margin-top: 1px; }
  .invite-status {
    font-size: 11px; font-weight: 600; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .invite-status.pending { color: var(--warn); }
  .invite-status.incoming-s { color: var(--col-network); }
  .invite-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-accept {
    background: var(--col-done-soft); color: var(--col-done);
    border: 1.5px solid var(--col-done); border-radius: 7px;
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .btn-accept:hover { background: var(--col-done); color: #fff; }
  .btn-decline {
    background: transparent; color: var(--ink-mute);
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .btn-decline:hover { background: #fee2e2; color: #dc2626; border-color: #dc2626; }
  .btn-revoke {
    background: transparent; color: var(--ink-mute);
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .btn-revoke:hover { background: #fee2e2; color: #dc2626; border-color: #dc2626; }

  .network-member-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    transition: all .15s;
  }
  .network-member-card:hover { border-color: var(--col-network-soft); }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 700; }
  .member-meta { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
  .member-actions { display: flex; gap: 6px; }
  .btn-remove-member {
    background: none; border: 1.5px solid var(--border);
    border-radius: 7px; padding: 4px 10px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    color: var(--ink-mute); font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .btn-remove-member:hover { background: #fee2e2; color: #dc2626; border-color: #dc2626; }

  /* INVITE MODAL */
  .invite-modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 460px; max-width: 95vw;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97);
    transition: transform .2s;
  }
  .modal-overlay.open .invite-modal { transform: translateY(0) scale(1); }
  .invite-method-tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
  }
  .invite-tab {
    flex: 1; padding: 8px 12px; border-radius: 7px;
    border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; color: var(--ink-soft);
    background: transparent; transition: all .15s;
  }
  .invite-tab.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  .invite-step { display: none; }
  .invite-step.active { display: block; }
  .invite-link-box {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 12px; font-weight: 600; color: var(--ink-soft);
    word-break: break-all; margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .invite-link-text { flex: 1; font-family: monospace; font-size: 11px; }
  .copy-link-btn {
    background: var(--col-network); color: #fff;
    border: none; border-radius: 6px; padding: 5px 12px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
    transition: all .15s; flex-shrink: 0;
  }
  .copy-link-btn:hover { background: #6d28d9; }
  .invite-or { text-align: center; font-size: 12px; color: var(--ink-mute); margin: 12px 0; position: relative; }
  .invite-or::before, .invite-or::after {
    content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border);
  }
  .invite-or::before { left: 0; }
  .invite-or::after { right: 0; }
  .invite-send-row { display: flex; gap: 8px; }
  .invite-send-row .form-input { flex: 1; }
  .btn-send-invite {
    background: var(--col-network); color: #fff;
    border: none; border-radius: 8px; padding: 10px 16px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
    transition: all .15s;
  }
  .btn-send-invite:hover { background: #6d28d9; }
  .invite-sent-confirm {
    display: none; text-align: center; padding: 16px;
    background: var(--col-done-soft); border-radius: 10px;
    border: 1.5px solid var(--col-done);
    margin-top: 10px;
  }
  .invite-sent-confirm .big-icon { font-size: 28px; margin-bottom: 6px; }
  .invite-sent-confirm p { font-size: 13px; font-weight: 600; color: var(--col-done); }
  .invite-sent-confirm small { font-size: 11px; color: var(--ink-soft); }
  .qr-placeholder {
    width: 140px; height: 140px; margin: 0 auto 12px;
    border: 2px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface2); font-size: 40px; gap: 4px;
  }
  .qr-label { font-size: 10px; color: var(--ink-mute); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* STATS VIEW */
  .view-stats { display: none; }
  .view-stats.active { display: block; }

  .stats-period-row {
    display: flex; gap: 4px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px; padding: 4px;
  }
  .stats-period-btn {
    padding: 7px 16px; border-radius: 7px;
    border: none; cursor: pointer;
    font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-soft); background: transparent;
    transition: all .15s;
  }
  .stats-period-btn.active {
    background: var(--surface); color: var(--ink);
    box-shadow: var(--shadow);
  }

  .stats-kpi-row {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .kpi-card {
    flex: 1; min-width: 140px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    transition: transform .15s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.todo::before { background: var(--col-todo); }
  .kpi-card.doing::before { background: var(--col-doing); }
  .kpi-card.done::before { background: var(--col-done); }
  .kpi-card.network-c::before { background: var(--col-network); }
  .kpi-card.total::before { background: var(--ink); }
  .kpi-card.overdue-c::before { background: #dc2626; }
  .kpi-value {
    font-family: 'Fraunces', serif;
    font-size: 40px; font-weight: 900;
    line-height: 1; color: var(--ink);
    margin-bottom: 4px;
  }
  .kpi-label {
    font-size: 12px; font-weight: 600; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .kpi-sub {
    font-size: 11px; color: var(--ink-mute); margin-top: 4px;
  }
  .kpi-icon {
    position: absolute; right: 14px; top: 14px;
    font-size: 22px; opacity: 0.18;
  }

  .stats-charts-row {
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .stats-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .stats-card-title {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ink-soft); margin-bottom: 18px;
  }

  /* BAR CHART */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); width: 72px; flex-shrink: 0; text-align: right; text-transform: capitalize; }
  .bar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .bar-count { font-size: 12px; font-weight: 700; color: var(--ink); width: 24px; flex-shrink: 0; }

  /* DONUT / RING STAT */
  .ring-stat {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .ring-wrap { position: relative; width: 120px; height: 120px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .ring-center-val { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 900; color: var(--ink); line-height: 1; }
  .ring-center-lbl { font-size: 10px; font-weight: 600; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.3px; }
  .ring-legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .ring-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--ink-soft); }
  .ring-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* COMPLETION TIME */
  .completion-bars { display: flex; flex-direction: column; gap: 8px; }
  .completion-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .completion-task { flex: 1; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .completion-days {
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .completion-days.fast { background: var(--col-done-soft); color: var(--col-done); }
  .completion-days.med { background: var(--warn-soft); color: var(--warn); }
  .completion-days.slow { background: #fee2e2; color: #dc2626; }
  .avg-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 6px 16px;
    font-size: 13px; font-weight: 700; color: var(--ink);
  }

  /* TASK LOG TABLE */
  .task-log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .task-log-table th {
    text-align: left; padding: 6px 10px 10px;
    font-size: 11px; font-weight: 700; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1.5px solid var(--border);
  }
  .task-log-table td {
    padding: 10px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .task-log-table tr:last-child td { border-bottom: none; }
  .task-log-table tr:hover td { background: var(--surface2); }
  .status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .status-pill.todo { background: var(--col-todo-soft); color: var(--col-todo); }
  .status-pill.doing { background: var(--col-doing-soft); color: var(--col-doing); }
  .status-pill.done { background: var(--col-done-soft); color: var(--col-done); }

  /* NETWORK ACTIVITY */
  .net-activity-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .net-activity-row:last-child { border-bottom: none; padding-bottom: 0; }
  .net-activity-icon { font-size: 20px; flex-shrink: 0; }
  .net-activity-text { flex: 1; font-size: 13px; color: var(--ink); }
  .net-activity-text strong { font-weight: 700; }
  .net-activity-count {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 700; color: var(--ink);
    flex-shrink: 0;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

  /* ANIMATIONS */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: slideIn .2s ease; }

  .view-network { display: none; }
  .view-network.active { display: block; }
  .view-board.hidden { display: none; }
  .view-stats { display: none; }
  .view-stats.active { display: block; }

  /* ============================================================
     RESPONSIVE — TABLET & MOBILE
  ============================================================ */

  /* ── TABLET (max 900px) ── */
  @media (max-width: 900px) {
    header { padding: 0 16px; height: 58px; }
    .date-chip { display: none; }
    .tabs { padding: 12px 16px 0; gap: 2px; }
    .tab { padding: 7px 12px; font-size: 13px; }
    .board-wrap { padding: 0 16px 24px; }
    .board-header-bar { padding: 10px 14px; flex-wrap: wrap; gap: 10px; }
    .board-filters { flex-wrap: wrap; gap: 6px; }
    .progress-wrap { padding: 0 16px; }
    .board { min-width: 700px; gap: 12px; }
    .modal { width: 95vw; padding: 20px; }
    .share-modal { width: 95vw; padding: 20px; }
    .invite-modal { width: 95vw; padding: 20px; }
  }

  /* ── MOBILE (max 640px) ── */
  @media (max-width: 640px) {

    /* Header */
    header {
      padding: 0 12px;
      height: 54px;
    }
    .logo-text { font-size: 17px; }
    .logo-mark { width: 30px; height: 30px; font-size: 15px; }
    .header-right { gap: 8px; }
    .avatar-row { display: none; }
    .date-chip { display: none; }

    /* Tabs — full width, equal size */
    .tabs {
      padding: 10px 12px 0;
      gap: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      font-size: 11px;
      border-radius: 8px 8px 0 0;
    }
    .tab-badge { display: none; }

    /* Progress bar */
    .progress-wrap { padding: 0 12px; }
    .progress-bar-bg {
      padding: 8px 12px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .progress-stats { gap: 8px; }
    .progress-label { font-size: 11px; }
    .progress-pct { font-size: 12px; }
    .stat { font-size: 11px; }

    /* Board header bar */
    .board-wrap { padding: 0 12px 80px; }
    .board-header-bar {
      padding: 10px 12px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .board-filters { gap: 5px; }
    .filter-pill { padding: 3px 10px; font-size: 11px; }
    .add-task-btn { width: 100%; justify-content: center; padding: 10px; }

    /* Board — horizontal scroll on mobile, each col full width */
    .board {
      display: flex;
      flex-direction: column;
      min-width: unset;
      gap: 16px;
    }
    .col {
      min-width: unset;
      max-width: unset;
      width: 100%;
    }

    /* Cards */
    .card { padding: 12px 14px; }
    .card-title { font-size: 13px; }
    .card-attachments { gap: 4px; }
    .card-attach-thumb { width: 40px; height: 40px; }

    /* Modals — full screen on mobile */
    .modal-overlay {
      align-items: flex-end;
      padding: 0;
    }
    .modal {
      width: 100vw;
      max-width: 100vw;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .share-modal {
      width: 100vw;
      max-width: 100vw;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
    }
    .invite-modal {
      width: 100vw;
      max-width: 100vw;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 18px; }

    /* Form rows stack on mobile */
    .form-row { flex-direction: column; gap: 0; }
    .name-row { flex-direction: column; gap: 0; }

    /* Stats */
    .stats-kpi-row { gap: 8px; }
    .kpi-card { min-width: calc(50% - 4px); padding: 14px; }
    .kpi-value { font-size: 30px; }
    .stats-charts-row { flex-direction: column; }
    .stats-card { padding: 16px; }
    .stats-period-row { width: 100%; }
    .stats-period-btn { font-size: 12px; padding: 6px 10px; }

    /* Network view */
    .invite-hero {
      flex-direction: column;
      text-align: center;
      gap: 12px;
    }
    .invite-now-btn { width: 100%; }
    .network-member-card { flex-wrap: wrap; gap: 8px; }
    .member-actions { width: 100%; justify-content: flex-end; }

    /* Notification panel */
    .notif-panel {
      position: fixed;
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      border-radius: 20px 20px 0 0;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* Context menu */
    .ctx-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      top: auto !important;
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding-bottom: 20px;
    }
    .ctx-item { padding: 14px 20px; font-size: 15px; }
    .ctx-divider { margin: 4px 0; }

    /* Share buttons */
    .share-buttons { gap: 8px; }
    .share-btn { padding: 11px 14px; }
    .share-btn-label { font-size: 13px; }

    /* PWA banners */
    #pwa-banner, #notif-permission-banner {
      bottom: 12px;
      width: calc(100% - 24px);
      left: 12px;
      transform: none;
      flex-wrap: wrap;
    }

    /* Attach zone */
    .attach-zone { padding: 12px; }
    .attach-zone-label { font-size: 12px; }

    /* Assignee chips wrap */
    .assign-row { flex-wrap: wrap; gap: 6px; }
    .assignee-chip { font-size: 12px; padding: 5px 10px; }

    /* Tag selector */
    .tag-selector { gap: 5px; }
    .tag-opt { font-size: 11px; padding: 4px 10px; }
  }

  /* ── SMALL MOBILE (max 380px) ── */
  @media (max-width: 380px) {
    .kpi-card { min-width: 100%; }
    .tab { font-size: 10px; padding: 7px 2px; }
    .filter-pill { font-size: 10px; padding: 3px 8px; }
    .card-title { font-size: 12px; }
  }

  /* ── BOTTOM NAV for mobile — fixed tab bar ── */
  @media (max-width: 640px) {
    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      border-radius: 0;
      padding: 8px 8px 12px;
      gap: 0;
      z-index: 99;
      box-shadow: 0 -4px 20px rgba(26,22,20,0.08);
    }
    .tab {
      border-radius: 8px;
      border: none;
      padding: 8px 4px 6px;
    }
    .tab.active {
      background: var(--accent-soft);
      color: var(--accent);
      border: none;
    }
    /* Push board content up so it's not hidden behind bottom nav */
    .view-board, .view-network, .view-stats {
      padding-bottom: 70px;
    }
  }
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">D</div>
    <div class="logo-text">Day<span>Flow</span></div>
  </div>
  <div class="header-right">
    <div class="date-chip" id="dateChip"></div>
    <div class="avatar-row">
      <div class="avatar me" title="You (Alex)">A</div>
      <div class="avatar net1" title="Jordan">J</div>
      <div class="avatar net2" title="Sam">S</div>
      <div class="avatar net3" title="Priya">P</div>
    </div>
    <button class="notif-btn" onclick="toggleNotif()" id="notifBtn">
      🔔
      <div class="notif-dot" id="notifDot"></div>
    </button>
    <button onclick="signOut()" title="Sign out" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--ink-soft)'">Sign out</button>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-panel-header">
      Notifications
      <span style="font-weight:400;color:var(--ink-soft);font-size:11px;cursor:pointer" onclick="markAllRead()">Mark all read</span>
    </div>
    <div id="notifList"></div>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('board', this)">📋 My Board</div>
  <div class="tab" onclick="switchTab('network', this)">🌐 Network <span class="tab-badge" id="netBadge">2</span></div>
  <div class="tab" onclick="switchTab('stats', this)">📊 Stats</div>
</div>

<!-- BOARD VIEW -->
<div class="view-board" id="viewBoard">

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-label">Today's Progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-pct" id="progressPct">0%</div>
      <div class="progress-stats">
        <div class="stat"><span id="statDone">0</span> done</div>
        <div class="stat"><span id="statTotal">0</span> total</div>
      </div>
    </div>
  </div>

  <!-- BOARD HEADER BAR -->
  <div class="board-wrap">
    <div class="board-header-bar">
      <div class="board-filters">
        <span style="font-size:12px;font-weight:600;color:var(--ink-soft)">Filter:</span>
        <button class="filter-pill active" onclick="filterCards('all',this)">All</button>
        <button class="filter-pill" onclick="filterCards('work',this)">Work</button>
        <button class="filter-pill" onclick="filterCards('home',this)">Home</button>
        <button class="filter-pill" onclick="filterCards('health',this)">Health</button>
        <button class="filter-pill" onclick="filterCards('personal',this)">Personal</button>
        <button class="filter-pill" onclick="filterCards('network',this)">🌐 Network</button>
      </div>
      <button class="add-task-btn" onclick="openModal()">
        ＋ Add Task
      </button>
    </div>

    <!-- BOARD COLUMNS -->
    <div class="board">
      <!-- TO DO -->
      <div class="col">
        <div class="col-header todo">📝 To Do <span class="col-count" id="count-todo">0</span></div>
        <div class="drop-zone" id="zone-todo" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'todo')"></div>
      </div>
      <!-- IN PROGRESS -->
      <div class="col">
        <div class="col-header doing">⚡ In Progress <span class="col-count" id="count-doing">0</span></div>
        <div class="drop-zone" id="zone-doing" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'doing')"></div>
      </div>
      <!-- DONE -->
      <div class="col">
        <div class="col-header done">✅ Done <span class="col-count" id="count-done">0</span></div>
        <div class="drop-zone" id="zone-done" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'done')"></div>
      </div>
      <!-- NETWORK ASSIGNED -->
      <div class="col">
        <div class="col-header network">🌐 From Network <span class="col-count" id="count-network">0</span></div>
        <div class="drop-zone" id="zone-network" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'network')"></div>
      </div>
    </div>
  </div>
</div>

<!-- NETWORK VIEW -->
<div class="view-network" id="viewNetwork">
  <div style="padding:24px 28px">

    <!-- Invite Hero Banner -->
    <div class="invite-hero">
      <div class="invite-hero-icon">🌐</div>
      <div class="invite-hero-text">
        <h3>Grow your DayFlow network</h3>
        <p>Invite friends, family, or colleagues so you can assign tasks to each other and collaborate on your daily life.</p>
      </div>
      <button class="invite-now-btn" onclick="openInviteModal()">＋ Invite Someone</button>
    </div>

    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <!-- Your network members -->
      <div style="flex:1;min-width:280px">
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:16px">Your Network</div>
        <div id="networkMembersList"></div>
      </div>

      <!-- Pending invites -->
      <div style="flex:1;min-width:280px">
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:4px">Invites</div>
        <div class="pending-section">
          <div class="pending-header">Incoming <span class="pending-badge" id="incomingCount">0</span></div>
          <div id="incomingInvitesList"></div>
          <div class="pending-header" style="margin-top:16px">Sent <span class="pending-badge" style="background:var(--warn)" id="outgoingCount">0</span></div>
          <div id="outgoingInvitesList"></div>
        </div>
      </div>

      <!-- Tasks panels -->
      <div style="flex:1;min-width:280px">
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:16px">Tasks I've Assigned</div>
        <div id="assignedByMeList"></div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin:20px 0 16px">Tasks Sent to Me</div>
        <div id="assignedToMeList"></div>
      </div>
    </div>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view-stats" id="viewStats">
  <div style="padding:24px 28px 32px">

    <!-- Period selector -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div style="font-family:'Fraunces',serif;font-size:26px;font-weight:600">Your Task Stats</div>
      <div class="stats-period-row" id="statsPeriodRow">
        <button class="stats-period-btn active" data-period="today" onclick="setStatsPeriod('today',this)">Today</button>
        <button class="stats-period-btn" data-period="week" onclick="setStatsPeriod('week',this)">This Week</button>
        <button class="stats-period-btn" data-period="all" onclick="setStatsPeriod('all',this)">All Time</button>
      </div>
    </div>

    <!-- KPI Cards Row -->
    <div class="stats-kpi-row" id="statsKpiRow"></div>

    <!-- Charts Row -->
    <div class="stats-charts-row">

      <!-- Category breakdown -->
      <div class="stats-card" style="flex:1;min-width:260px">
        <div class="stats-card-title">📁 Tasks by Category</div>
        <div id="statsCategoryChart"></div>
      </div>

      <!-- Priority breakdown -->
      <div class="stats-card" style="flex:1;min-width:260px">
        <div class="stats-card-title">🎯 Tasks by Priority</div>
        <div id="statsPriorityChart"></div>
      </div>

      <!-- Completion time -->
      <div class="stats-card" style="flex:1;min-width:260px">
        <div class="stats-card-title">⏱️ Days to Completion</div>
        <div id="statsCompletionChart"></div>
        <div id="statsAvgDays" style="text-align:center;margin-top:12px"></div>
      </div>

    </div>

    <!-- Task log table -->
    <div class="stats-card" style="margin-top:18px">
      <div class="stats-card-title" style="margin-bottom:16px">📋 Task Log</div>
      <div id="statsTaskLog"></div>
    </div>

    <!-- Network activity -->
    <div class="stats-card" style="margin-top:18px">
      <div class="stats-card-title" style="margin-bottom:16px">🌐 Network Activity</div>
      <div id="statsNetworkActivity"></div>
    </div>

  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>

    <div class="form-group">
      <label class="form-label">Task Title</label>
      <input class="form-input" id="taskTitle" placeholder="What needs to be done?" />
    </div>

    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="taskNote" placeholder="Any extra details..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="tag-selector" id="tagSelector">
          <div class="tag-opt" data-tag="work" onclick="selectTag(this)">Work</div>
          <div class="tag-opt" data-tag="home" onclick="selectTag(this)">Home</div>
          <div class="tag-opt" data-tag="health" onclick="selectTag(this)">Health</div>
          <div class="tag-opt" data-tag="personal" onclick="selectTag(this)">Personal</div>
          <div class="tag-opt" data-tag="errand" onclick="selectTag(this)">Errand</div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="taskPriority">
          <option value="med">Medium</option>
          <option value="high">High 🔴</option>
          <option value="low">Low 🟢</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due</label>
        <input class="form-input" type="date" id="taskDue" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Assign to (Network)</label>
      <div class="assign-row" id="assigneeRow">
        <div class="assignee-chip" data-person="me" onclick="selectAssignee(this)">
          <div class="mini-avatar" style="background:var(--accent)">A</div> Me only
        </div>
        <div class="assignee-chip" data-person="Jordan" onclick="selectAssignee(this)">
          <div class="mini-avatar" style="background:#7c3aed">J</div> Jordan
        </div>
        <div class="assignee-chip" data-person="Sam" onclick="selectAssignee(this)">
          <div class="mini-avatar" style="background:#2d6a4f">S</div> Sam
        </div>
        <div class="assignee-chip" data-person="Priya" onclick="selectAssignee(this)">
          <div class="mini-avatar" style="background:#d4a017">P</div> Priya
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Attachments</label>
      <div class="attach-zone" id="attachZone"
        ondragover="attachDragOver(event)" ondragleave="attachDragLeave(event)" ondrop="attachDrop(event)">
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.zip" onchange="handleFileSelect(event)" />
        <div class="attach-zone-label">📎 <span>Click to attach</span> or drag & drop</div>
        <div class="attach-zone-sub">Images, PDFs, documents — up to 10MB each</div>
      </div>
      <div class="attach-list" id="attachList"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction('todo')">📝 Move to To Do</div>
  <div class="ctx-item" onclick="ctxAction('doing')">⚡ Move to In Progress</div>
  <div class="ctx-item" onclick="ctxAction('done')">✅ Mark Done</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" onclick="ctxAction('edit')">✏️ Edit</div>
  <div class="ctx-item" onclick="ctxAction('share')">📤 Share Task</div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">🗑️ Delete</div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareOverlay" onclick="handleShareOverlayClick(event)">
  <div class="share-modal">
    <div class="modal-title">📤 Share Task</div>
    <div class="share-task-preview" id="sharePreview">
      <div class="stitle" id="shareTitle"></div>
      <div class="smeta" id="shareMeta"></div>
    </div>
    <div class="share-buttons">
      <a class="share-btn whatsapp" id="whatsappBtn" href="#" target="_blank" rel="noopener">
        <span class="share-btn-icon">💬</span>
        <span class="share-btn-text">
          <span class="share-btn-label">Share via WhatsApp</span>
          <span class="share-btn-sub">Opens WhatsApp with task details</span>
        </span>
      </a>
      <a class="share-btn email" id="emailBtn" href="#" target="_blank">
        <span class="share-btn-icon">✉️</span>
        <span class="share-btn-text">
          <span class="share-btn-label">Share via Email</span>
          <span class="share-btn-sub">Opens your mail app with task details</span>
        </span>
      </a>
      <button class="share-btn copy" onclick="copyTaskText()">
        <span class="share-btn-icon">📋</span>
        <span class="share-btn-text">
          <span class="share-btn-label">Copy to Clipboard</span>
          <span class="share-btn-sub">Copy task details as plain text</span>
        </span>
      </button>
    </div>
    <div class="copy-confirm" id="copyConfirm">✅ Copied to clipboard!</div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeShareModal()">Close</button>
    </div>
  </div>
</div>

<!-- INVITE MODAL -->
<div class="modal-overlay" id="inviteOverlay" onclick="handleInviteOverlayClick(event)">
  <div class="invite-modal">
    <div class="modal-title">🌐 Invite to Your Network</div>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:18px;line-height:1.5">Choose how you'd like to invite someone. Once they accept, you'll both be able to assign tasks to each other.</p>

    <!-- Method tabs -->
    <div class="invite-method-tabs">
      <button class="invite-tab active" onclick="switchInviteTab('email', this)">✉️ Email</button>
      <button class="invite-tab" onclick="switchInviteTab('whatsapp', this)">💬 WhatsApp</button>
      <button class="invite-tab" onclick="switchInviteTab('link', this)">🔗 Link</button>
      <button class="invite-tab" onclick="switchInviteTab('qr', this)">📱 QR Code</button>
    </div>

    <!-- EMAIL TAB -->
    <div class="invite-step active" id="invite-step-email">
      <div class="form-group">
        <label class="form-label">Their Name</label>
        <input class="form-input" id="inviteNameEmail" placeholder="e.g. Sarah Jones" />
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="invite-send-row">
          <input class="form-input" id="inviteEmail" placeholder="sarah@example.com" type="email" />
          <button class="btn-send-invite" onclick="sendInvite('email')">Send Invite</button>
        </div>
      </div>
      <div class="invite-sent-confirm" id="emailSentConfirm">
        <div class="big-icon">🎉</div>
        <p>Invite sent!</p>
        <small id="emailSentTo"></small>
      </div>
    </div>

    <!-- WHATSAPP TAB -->
    <div class="invite-step" id="invite-step-whatsapp">
      <div class="form-group">
        <label class="form-label">Their Name</label>
        <input class="form-input" id="inviteNameWA" placeholder="e.g. Marcus Webb" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="invite-send-row">
          <input class="form-input" id="invitePhone" placeholder="+44 7700 900000" type="tel" />
          <a class="btn-send-invite" id="waInviteLink" href="#" target="_blank" rel="noopener" onclick="sendInvite('whatsapp')">Send via WA</a>
        </div>
      </div>
      <div class="invite-sent-confirm" id="waSentConfirm">
        <div class="big-icon">💬</div>
        <p>WhatsApp opened!</p>
        <small id="waSentTo"></small>
      </div>
    </div>

    <!-- LINK TAB -->
    <div class="invite-step" id="invite-step-link">
      <div class="form-group">
        <label class="form-label">Your Personal Invite Link</label>
        <div class="invite-link-box">
          <span class="invite-link-text" id="inviteLinkText"></span>
          <button class="copy-link-btn" onclick="copyInviteLink()">Copy</button>
        </div>
        <p style="font-size:11px;color:var(--ink-mute);line-height:1.5">Share this link with anyone. When they open it and create an account, they'll automatically be added to your network.</p>
      </div>
      <div class="invite-or">or share directly</div>
      <div style="display:flex;gap:8px">
        <a class="share-btn whatsapp" style="flex:1" id="shareLinkWA" href="#" target="_blank" rel="noopener">
          <span class="share-btn-icon">💬</span>
          <span class="share-btn-text"><span class="share-btn-label">Share on WhatsApp</span></span>
        </a>
        <a class="share-btn email" style="flex:1" id="shareLinkEmail" href="#">
          <span class="share-btn-icon">✉️</span>
          <span class="share-btn-text"><span class="share-btn-label">Share via Email</span></span>
        </a>
      </div>
      <div class="copy-confirm" id="linkCopyConfirm" style="margin-top:10px">✅ Link copied!</div>
    </div>

    <!-- QR CODE TAB -->
    <div class="invite-step" id="invite-step-qr">

function renderCard(t) {
  const today = new Date().toISOString().split('T')[0];
  let dueClass = '';
  let dueText = '';
  if (t.due) {
    if (t.due < today) { dueClass='overdue'; dueText='⚠️ Overdue'; }
    else if (t.due === today) { dueClass='today'; dueText='Today'; }
    else { dueText = new Date(t.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  }
  const pColor = {high:'#dc2626',med:'#d4a017',low:'#22c55e'}[t.priority];
  const netInfo = t.assignedBy ? network[t.assignedBy] : null;
  const cardClass = `card${t.assignedBy ? ' network-assigned' : ''}${t.assignedTo && t.assignedTo !== 'me' ? ' from-me' : ''}`;

  const attachHtml = (() => {
    if (!t.attachments || t.attachments.length === 0) return '';
    const imgs = t.attachments.filter(a => a.type.startsWith('image/'));
    const files = t.attachments.filter(a => !a.type.startsWith('image/'));
    const MAX_SHOW = 3;
    let html = '<div class="card-attachments">';
    let shown = 0;
    imgs.slice(0, MAX_SHOW).forEach(a => {
      html += `<img class="card-attach-thumb" src="${a.dataUrl}" alt="${a.name}" title="${a.name}" onclick="openLightbox('${a.dataUrl}','${a.name}')" />`;
      shown++;
    });
    files.forEach(a => {
      if (shown >= MAX_SHOW) return;
      const icon = fileIcon(a.type);
      html += `<div class="card-attach-file" title="${a.name}">${icon} ${a.name}</div>`;
      shown++;
    });
    const remaining = t.attachments.length - shown;
    if (remaining > 0) html += `<div class="card-attach-count">+${remaining}</div>`;
    html += '</div>';
    return html;
  })();

  return `<div class="${cardClass}" id="card-${t.id}" draggable="true"
    ondragstart="onDragStart(event,${t.id})"
    ondragend="onDragEnd(event)"
    oncontextmenu="openCtx(event,${t.id})">
    <div class="card-top">
      <div style="display:flex;gap:7px;align-items:flex-start">
        <div class="priority-dot ${t.priority}" style="background:${pColor}"></div>
        <div class="card-title">${t.title}</div>
      </div>
      <button class="card-menu-btn" onclick="openCtx(event,${t.id})">⋯</button>
    </div>
    ${t.note ? `<div class="card-note">${t.note}</div>` : ''}
    <div class="card-meta" style="margin-top:8px">
      ${t.tag ? `<span class="tag ${t.tag}">${t.tag}</span>` : ''}
      ${t.due ? `<span class="card-due ${dueClass}">📅 ${dueText}</span>` : ''}
    </div>
    ${attachHtml}
    ${netInfo ? `
    <div class="card-footer" style="margin-top:10px">
      <div class="assigned-by">
        <div class="mini-avatar" style="background:${netInfo.color}">${netInfo.initial}</div>
        Assigned by ${t.assignedBy}
      </div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="openShareModal(${t.id})" title="Share">📤</button>
        <button class="card-action-btn" onclick="moveCard(${t.id},'doing')" title="Start">▶</button>
        <button class="card-action-btn" onclick="moveCard(${t.id},'done')" title="Done">✓</button>
      </div>
    </div>` : `
    <div class="card-footer" style="margin-top:10px">
      <div></div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="openShareModal(${t.id})" title="Share task">📤</button>
      </div>
    </div>`}
    ${t.col === 'done' ? `<div style="margin-top:8px;font-size:11px;color:var(--col-done);font-weight:600">✅ Completed</div>` : ''}
  </div>`;
}

function updateProgress() {

  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;

// DRAG & DROP
function onDragStart(e, id) {
  dragId = id;
  setTimeout(() => document.getElementById('card-'+id)?.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  if (dragId) document.getElementById('card-'+dragId)?.classList.remove('dragging');
  dragId = null;
}
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, col) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  moveCard(dragId, col);
}

function moveCard(id, col) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (col === 'network') { t.col = 'todo'; }
  else {
    // If moving to done and it was assigned by a network member — notify
    if (col === 'done' && t.assignedBy && t.assignedBy !== 'me') {
      notifyTaskCompleted(t.title, t.assignedBy);
    }
    t.col = col;
  }
  render();
}

function filterCards(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// MODAL
function openModal(e, preassign) {
  editId = null;
  pendingAttachments = [];
  document.getElementById('modalTitle').textContent = preassign ? `Assign Task to ${preassign}` : 'New Task';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskNote').value = '';
  document.getElementById('taskDue').value = new Date().toISOString().split('T')[0];
  document.getElementById('taskPriority').value = 'med';
  selectedTag = null;
  document.querySelectorAll('.tag-opt').forEach(t => t.classList.remove('selected'));
  selectedAssignee = preassign || 'me';
  document.querySelectorAll('.assignee-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.person === selectedAssignee);
  });
  renderAttachList();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('taskTitle').focus(), 200);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editId = null;
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function selectTag(el) {
  document.querySelectorAll('.tag-opt').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedTag = el.dataset.tag;
}
function selectAssignee(el) {
  document.querySelectorAll('.assignee-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedAssignee = el.dataset.person;
}
function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { document.getElementById('taskTitle').style.borderColor='#dc2626'; return; }
  document.getElementById('taskTitle').style.borderColor='';
  const assignedTo = selectedAssignee === 'me' ? 'me' : selectedAssignee;
  const assignedBy = selectedAssignee !== 'me' ? 'me' : null;
  if (editId) {
    const t = tasks.find(t => t.id === editId);
    if (t) {
      t.title = title;
      t.note = document.getElementById('taskNote').value;
      t.tag = selectedTag || t.tag;
      t.priority = document.getElementById('taskPriority').value;
      t.due = document.getElementById('taskDue').value;
      t.assignedTo = assignedTo;
      t.assignedBy = assignedBy;
      // Merge new attachments with existing ones
      t.attachments = [...(t.attachments || []), ...pendingAttachments];
    }
  } else {
    tasks.push({
      id: nextId++,
      title,
      note: document.getElementById('taskNote').value,
      tag: selectedTag || 'personal',
      priority: document.getElementById('taskPriority').value,
      due: document.getElementById('taskDue').value,
      col: 'todo',
      assignedTo,
      assignedBy,
      attachments: [...pendingAttachments],
    });
    if (assignedTo !== 'me') {
      notifications.unshift({ id: Date.now(), text: `You assigned <strong>${title}</strong> to <strong>${assignedTo}</strong>`, time: 'Just now', read: false });
      // In a real app, this would send a push to the assignee's device via Supabase
      // For now we notify the current user that the assignment was made
    }
  }
  pendingAttachments = [];
  closeModal();
  render();
}

// CONTEXT MENU
function openCtx(e, id) {
  e.preventDefault();
  e.stopPropagation();
  ctxTaskId = id;
  const menu = document.getElementById('ctxMenu');
  menu.style.left = Math.min(e.clientX, window.innerWidth-180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight-200) + 'px';
  menu.classList.add('open');
}
function ctxAction(action) {
  if (!ctxTaskId) return;
  if (action === 'delete') {
    tasks = tasks.filter(t => t.id !== ctxTaskId);
  } else if (action === 'share') {
    openShareModal(ctxTaskId);
  } else if (action === 'edit') {
    const t = tasks.find(t => t.id === ctxTaskId);
    if (t) {
      editId = t.id;
      pendingAttachments = []; // new attachments only; existing ones stay on task
      document.getElementById('modalTitle').textContent = 'Edit Task';
      document.getElementById('taskTitle').value = t.title;
      document.getElementById('taskNote').value = t.note || '';
      document.getElementById('taskPriority').value = t.priority;
      document.getElementById('taskDue').value = t.due || '';
      selectedTag = t.tag;
      document.querySelectorAll('.tag-opt').forEach(el => el.classList.toggle('selected', el.dataset.tag === t.tag));
      selectedAssignee = t.assignedTo || 'me';
      document.querySelectorAll('.assignee-chip').forEach(c => c.classList.toggle('selected', c.dataset.person === selectedAssignee));
      renderAttachList(t.attachments || []);
      document.getElementById('modalOverlay').classList.add('open');
    }
  } else {
    moveCard(ctxTaskId, action);
  }
  document.getElementById('ctxMenu').classList.remove('open');
  render();
}

let shareTaskId = null;

function buildShareText(t) {
  const priorityLabel = { high: '🔴 High', med: '🟡 Medium', low: '🟢 Low' }[t.priority] || t.priority;
  const statusLabel = { todo: '📝 To Do', doing: '⚡ In Progress', done: '✅ Done' }[t.col] || t.col;
  const due = t.due ? new Date(t.due).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' }) : 'No due date';

  text += `📌 Status: ${statusLabel}\n`;

// ATTACHMENTS
function fileIcon(type) {
  if (type.startsWith('image/')) return '🖼️';
  if (type === 'application/pdf') return '📄';
  if (type.includes('word') || type.includes('document')) return '📝';
  if (type.includes('sheet') || type.includes('excel')) return '📊';
  if (type.includes('presentation') || type.includes('powerpoint')) return '📑';
  if (type.includes('zip') || type.includes('rar')) return '🗜️';
  return '📎';
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function renderAttachList(existingAttachments) {
  const list = document.getElementById('attachList');
  const all = [...(existingAttachments || []), ...pendingAttachments];
  if (all.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = all.map((a, i) => {
    const isExisting = existingAttachments && i < existingAttachments.length;
    const pendingIdx = isExisting ? null : i - (existingAttachments ? existingAttachments.length : 0);
    const thumb = a.type.startsWith('image/')
      ? `<img class="attach-thumb" src="${a.dataUrl}" alt="${a.name}" />`
      : `<div class="attach-icon">${fileIcon(a.type)}</div>`;
    return `<div class="attach-item">
      ${thumb}
      <div class="attach-info">
        <div class="attach-name" title="${a.name}">${a.name}</div>
        <div class="attach-size">${formatBytes(a.size)}</div>
      </div>
      ${!isExisting ? `<button class="attach-remove" onclick="removePendingAttach(${pendingIdx})" title="Remove">✕</button>` : `<span style="font-size:10px;color:var(--ink-mute);padding:2px 6px;background:var(--surface);border-radius:4px;border:1px solid var(--border)">saved</span>`}
    </div>`;
  }).join('');
}

function removePendingAttach(idx) {
  pendingAttachments.splice(idx, 1);
  const t = editId ? tasks.find(t => t.id === editId) : null;
  renderAttachList(t ? t.attachments : []);
}

function processFiles(files) {
  const MAX = 10 * 1024 * 1024;
  Array.from(files).forEach(file => {
    if (file.size > MAX) { alert(`"${file.name}" is too large (max 10MB)`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      pendingAttachments.push({ name: file.name, size: file.size, type: file.type, dataUrl: e.target.result });
      const t = editId ? tasks.find(t => t.id === editId) : null;
      renderAttachList(t ? t.attachments : []);
    };
    reader.readAsDataURL(file);
  });
}

function handleFileSelect(e) {
  processFiles(e.target.files);
  e.target.value = ''; // reset so same file can be re-added
}

function attachDragOver(e) {
  e.preventDefault();
  document.getElementById('attachZone').classList.add('dragover');
}
function attachDragLeave(e) {
  document.getElementById('attachZone').classList.remove('dragover');
}
function attachDrop(e) {
  e.preventDefault();
  document.getElementById('attachZone').classList.remove('dragover');
  processFiles(e.dataTransfer.files);
}

      window.location.href = 'mailto:' + email + '?subject=' + encodeURIComponent('You\'re invited to join my DayFlow network!') + '&body=' + encodeURIComponent(`Hi ${name},\n\nI'd like to add you to my DayFlow network so we can assign tasks to each other.\n\nClick here to join: ${link}\n\n— Simba Chitauro via DayFlow (© 2026 Simba Chitauro)`);
    }, 300);

  } else if (method === 'whatsapp') {
    const name = document.getElementById('inviteNameWA').value.trim();
    const phone = document.getElementById('invitePhone').value.trim().replace(/\s+/g,'');
    if (!name || !phone) { alert('Please enter a name and phone number.'); return false; }
    const code = generateCode();
    const link = INVITE_BASE_URL + code;
    pendingInvites.push({ id:'inv'+Date.now(), type:'outgoing', name, email: phone, code, sentAt:'Just now', method:'whatsapp' });

function acceptInvite(id) {
  const inv = pendingInvites.find(i => i.id === id);
  if (!inv) return;
  // Add to network
  const colors = ['#e11d48','#0284c7','#7c3aed','#059669','#b45309','#dc2626'];
  const color = colors[Object.keys(networkMembers).length % colors.length];
  const initial = inv.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const key = inv.name.split(' ')[0]; // Use first name as key
  networkMembers[key] = { color, initial, fullName: inv.name, email: inv.email, joined: 'Today' };
  // Remove from pending
  pendingInvites = pendingInvites.filter(i => i.id !== id);
  notifications.unshift({ id:Date.now(), text:`<strong>${inv.name}</strong> has joined your network! 🎉`, time:'Just now', read:false });
  notifyNetworkInvite(inv.name);
  renderNetworkView(); renderNotifications(); render();
}

function declineInvite(id) {
  const inv = pendingInvites.find(i => i.id === id);
  if (!inv) return;
  if (!confirm(`Decline invite from ${inv.name}?`)) return;
  pendingInvites = pendingInvites.filter(i => i.id !== id);
  renderNetworkView();
}

function revokeInvite(id) {
  const inv = pendingInvites.find(i => i.id === id);
  if (!inv) return;
  if (!confirm(`Revoke invite sent to ${inv.name}?`)) return;
  pendingInvites = pendingInvites.filter(i => i.id !== id);

function removeMember(key) {

// STATS
let statsPeriod = 'today';

function setStatsPeriod(period, btn) {
  statsPeriod = period;
  document.querySelectorAll('.stats-period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
